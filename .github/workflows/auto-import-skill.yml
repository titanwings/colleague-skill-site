name: Auto Import Skill from meta.json

on:
  issues:
    types: [opened, labeled]

jobs:
  import:
    name: Read meta.json and create PR
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'community-skill')
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Parse issue and fetch meta.json
        id: import
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Parse fields from issue form
            function extractField(label, text) {
              const re = new RegExp(`### ${label}\\s*\\n+([^\\n#]+)`, 'i');
              const m = text.match(re);
              return m ? m[1].trim() : '';
            }

            const skillRepo = extractField('你的 Skill 仓库地址', body);
            const slug      = extractField('Skill 的 slug', body);
            const author    = extractField('你的 GitHub 用户名', body);

            if (!skillRepo || !slug || !author) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ 无法解析 Issue 内容，请确认三个字段都填写了：仓库地址、slug、GitHub 用户名。`,
              });
              core.setFailed('Missing required fields');
              return;
            }

            // Extract owner/repo from URL
            const repoMatch = skillRepo.match(/github\.com\/([^\/]+)\/([^\/\s]+)/);
            if (!repoMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ 仓库地址格式不对，应该是 \`https://github.com/username/repo\`。`,
              });
              core.setFailed('Invalid repo URL');
              return;
            }

            const [, repoOwner, repoName] = repoMatch;

            // Fetch meta.json
            let meta;
            try {
              const resp = await github.rest.repos.getContent({
                owner: repoOwner,
                repo: repoName,
                path: `colleagues/${slug}/meta.json`,
              });
              meta = JSON.parse(Buffer.from(resp.data.content, 'base64').toString());
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ 找不到 \`colleagues/${slug}/meta.json\`，请确认：\n- 仓库是公开的\n- slug 拼写正确\n- meta.json 在 \`colleagues/${slug}/\` 目录下`,
              });
              core.setFailed('meta.json not found');
              return;
            }

            // Fetch work.md for preview (first 200 chars of description)
            let workPreview = '';
            try {
              const workResp = await github.rest.repos.getContent({
                owner: repoOwner,
                repo: repoName,
                path: `colleagues/${slug}/work.md`,
              });
              const workContent = Buffer.from(workResp.data.content, 'base64').toString();
              // Extract first non-heading paragraph
              const lines = workContent.split('\n').filter(l => l.trim() && !l.startsWith('#'));
              workPreview = lines[0]?.substring(0, 200) || '';
            } catch {}

            // Map meta.json → gallery YAML
            const gallerySlug = slug.replace(/_/g, '-');
            const tags = meta.tags?.personality?.slice(0, 3) || [];
            const culture = meta.tags?.culture?.[0] || '';

            // Detect domain tags from role/department
            const roleText = `${meta.profile?.role || ''} ${meta.profile?.department || ''}`.toLowerCase();
            const domainTags = [];
            if (/前端|frontend|react|vue/.test(roleText)) domainTags.push('frontend');
            if (/后端|backend|server|api/.test(roleText)) domainTags.push('backend');
            if (/安全|security/.test(roleText)) domainTags.push('security');
            if (/运维|devops|infra/.test(roleText)) domainTags.push('devops');
            if (/数据|data|ml|ai/.test(roleText)) domainTags.push('data');
            if (/设计|design|ui|ux/.test(roleText)) domainTags.push('design');
            if (/产品|product|pm/.test(roleText)) domainTags.push('product');
            if (/hr|人力|招聘/.test(roleText)) domainTags.push('hr');
            if (/管理|manager|lead/.test(roleText)) domainTags.push('management');
            if (domainTags.length === 0) domainTags.push('other');

            const createdAt = meta.created_at
              ? meta.created_at.substring(0, 10)
              : new Date().toISOString().substring(0, 10);

            const description = meta.impression || workPreview || `来自 ${meta.profile?.company || '未知公司'} 的 ${meta.profile?.role || 'Skill'}`;

            const yaml = `name: "${meta.name}"
slug: "${gallerySlug}"

author:
  name: "${author}"
  github: "${author}"

description: >
  ${description}

tags:
${domainTags.map(t => `  - ${t}`).join('\n')}

personality:
${tags.map(t => `  - ${t}`).join('\n') || '  - 专业'}

company_culture: "${culture}"

level: "${meta.profile?.level ? `${meta.profile.role} · ${meta.profile.level}` : meta.profile?.role || ''}"

preview_conversation: []

created_at: "${createdAt}"

skill_repo: "${skillRepo}"
`;

            core.setOutput('yaml', yaml);
            core.setOutput('slug', gallerySlug);
            core.setOutput('author', author);
            core.setOutput('issue_number', String(issue.number));

      - name: Create branch and PR
        if: steps.import.outputs.yaml != ''
        uses: actions/github-script@v7
        env:
          YAML_CONTENT: ${{ steps.import.outputs.yaml }}
          SKILL_SLUG: ${{ steps.import.outputs.slug }}
          AUTHOR: ${{ steps.import.outputs.author }}
          ISSUE_NUMBER: ${{ steps.import.outputs.issue_number }}
        with:
          script: |
            const yaml     = process.env.YAML_CONTENT;
            const slug     = process.env.SKILL_SLUG;
            const author   = process.env.AUTHOR;
            const issueNum = process.env.ISSUE_NUMBER;

            const branch = `skill/auto-${slug}-${Date.now()}`;
            const filePath = `website/src/content/skills/${slug}.yaml`;

            // Get current main SHA
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main',
            });

            // Create branch
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${branch}`,
              sha: ref.object.sha,
            });

            // Create file
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `feat: add skill ${slug} (auto-imported from Issue #${issueNum})`,
              content: Buffer.from(yaml).toString('base64'),
              branch,
            });

            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Skill] ${slug}`,
              head: branch,
              base: 'main',
              body: `Auto-imported from Issue #${issueNum} by @${author}.\n\n请 review 以下内容是否正确，然后合并即可上线到 Gallery。\n\n---\n\n\`\`\`yaml\n${yaml}\n\`\`\``,
            });

            // Comment on issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issueNum),
              body: `✅ 已自动读取 meta.json，生成了 PR：${pr.html_url}\n\n维护者 review 后合并，你的 Skill 就会出现在 Gallery 里！\n\n如果信息有偏差，可以直接在 PR 里修改 YAML 文件。`,
            });
