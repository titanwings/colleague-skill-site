name: "🧬 提交 Skill"
description: "把你蒸馏的 Skill 分享到 Gallery"
title: "[Skill] "
labels: ["community-skill"]
body:
  - type: markdown
    attributes:
      value: |
        填好下面两个字段，机器人会自动读取你的 `meta.json` 并帮你生成 Gallery 条目。

  - type: input
    id: skill_repo
    attributes:
      label: 你的 Skill 仓库地址
      description: 包含 `colleagues/{slug}/meta.json` 的 GitHub 仓库
      placeholder: "https://github.com/yourname/my-skills"
    validations:
      required: true

  - type: input
    id: slug
    attributes:
      label: Skill 的 slug
      description: 对应 `colleagues/` 下的目录名
      placeholder: "example_tianyi"
    validations:
      required: true

  - type: input
    id: author_github
    attributes:
      label: 你的 GitHub 用户名
      placeholder: "yourname"
    validations:
      required: true
