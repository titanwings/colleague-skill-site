name: "🎯 提交社区 Skill"
description: "分享你蒸馏的同事 Skill，让更多人可以使用"
title: "[Skill] "
labels: ["community-skill"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你的贡献！
        填完这个表单，维护者审核后会帮你把 Skill 加入 Gallery。
        如果你熟悉 GitHub，也可以直接按 [模板](../blob/main/website/src/content/skills/_template.yaml) 提 PR，更快！

  - type: input
    id: name
    attributes:
      label: Skill 名称
      description: 这个同事的称呼（不需要真实姓名，昵称/角色名都行）
      placeholder: "安全工程师小王"
    validations:
      required: true

  - type: input
    id: slug
    attributes:
      label: Slug（英文标识符）
      description: 全局唯一，只能用小写字母、数字和连字符
      placeholder: "security-engineer-wang"
    validations:
      required: true

  - type: input
    id: author_name
    attributes:
      label: 你的名字
      placeholder: "张三"
    validations:
      required: true

  - type: input
    id: author_github
    attributes:
      label: 你的 GitHub 用户名
      placeholder: "zhangsan"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Skill 描述
      description: "描述这个同事能做什么、工作风格是什么。越具体越好。"
      placeholder: |
        专注 Web 安全审计的工程师。Code review 时先看鉴权，然后是 SQL。
        高危问题当场给方案，低危加 TODO。说话直接，绝不说废话。
    validations:
      required: true

  - type: dropdown
    id: tags
    attributes:
      label: 技能领域（可多选）
      multiple: true
      options:
        - frontend
        - backend
        - security
        - devops
        - data
        - design
        - product
        - hr
        - management
        - other
    validations:
      required: true

  - type: input
    id: personality
    attributes:
      label: 性格标签（逗号分隔，最多3个）
      placeholder: "严谨, 直接, 完美主义"

  - type: dropdown
    id: company_culture
    attributes:
      label: 企业文化风格
      options:
        - 字节风
        - 阿里风
        - 腾讯风
        - 华为风
        - 创业风
        - 外企风
        - 国企风
        - 其他

  - type: input
    id: level
    attributes:
      label: 职级描述
      placeholder: "高级工程师 / Staff / P6..."

  - type: textarea
    id: preview_conversation
    attributes:
      label: 效果预览对话
      description: |
        展示一段典型对话，用以下格式：
        user: 用户说的话
        skill: Skill 的回复
      placeholder: |
        user: 帮我看看这个 API 有没有安全问题
        skill: 先看鉴权——这个接口没有 rate limiting，且参数直接拼 SQL，两个都是高危。改法：① 加鉴权中间件 ② SQL 改参数化查询。
    validations:
      required: true

  - type: input
    id: skill_repo
    attributes:
      label: Skill 文件仓库地址（可选）
      description: 如果你把 SKILL.md 等文件放在公开仓库里，可以填在这里
      placeholder: "https://github.com/yourname/your-skills"

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: "描述中没有包含真实姓名或其他敏感信息"
          required: true
        - label: "预览对话真实反映了这个 Skill 的能力"
          required: true
        - label: "我同意以 MIT 协议贡献这个 Skill"
          required: true
