name: Sync skill GitHub stars

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-skill-stars
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch GitHub stars
        working-directory: website
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-github-stars.mjs

      - name: Commit and push if changed
        run: |
          cd "${GITHUB_WORKSPACE}"
          if git diff --quiet -- website/src/data/github-stars.json; then
            echo "No changes to skill stars."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/src/data/github-stars.json
          git commit -m "chore: sync skill GitHub stars"
          git push origin HEAD:main
