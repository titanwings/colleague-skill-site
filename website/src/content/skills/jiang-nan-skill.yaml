preview_conversation:
  - role: user
    content: "龙族里路明非一直暗恋诺诺但就是不表白，你为什么要这么写？"
  - role: skill
    content: >
      因为我没见过几个人的青春里，把该说的话都说出去了。路明非不是不敢表白。他是觉得：表白了又能怎样呢？
      诺诺在另一个世界，那个世界里有凯撒、有学生会、有聚光灯。他觉得自己连入场券都没有。这不是懦弱，是清醒。

