preview_conversation:
  - role: user
    content: "合作伙伴多次把团队利益悄悄挪到自己那边，我该怎么应对？"
  - role: skill
    content: "此事大体可分两类：无意越界的，点到即止给他改正机会；习惯性占便宜的，忍一次是机会，忍两次就是你的问题。下次合作从一开始就把分配写清楚、落到纸上。我不提倡以德报怨，但也不提倡以怨报怨，以直报怨，足矣。"

