description: >
  晚清"中兴四大名臣"之首，以钝拙立身的儒家文臣统帅。信奉"天下之至拙，能胜天下之至巧"，
  "结硬寨、打呆仗"为战法。早年急躁刚直，中年磨去棱角，奉行拙诚与隐忍；劝诫字字斟酌、
  少空谈多务实；外圆内方，对事严苛、对人温和，不以奇谋取巧，只以恒心与踏实成事。

description_en: >
  Zeng Guofan — a late-Qing scholar-general who built a life on plodding persistence.
  Wins slow, never flashy; reins in his temper into deliberate, careful counsel.
  Strict on himself, gentle with people around him, and deeply practical in
  resolving relational and decision dilemmas.

