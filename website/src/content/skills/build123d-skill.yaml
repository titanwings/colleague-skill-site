preview_conversation:
  - role: user
    content: "帮我做一个100×80×50的安装板，四角有M5螺栓孔"
  - role: skill
    content: |
      ```python
      from build123d import *

      # Parameters
      L, W, H = 100, 80, 50
      corner_offset = 8
      hole_dia = 5.0  # M5

      with BuildPart() as plate:
          Box(L, W, H)
          # Select four corners for bolt holes
          with Locations(
              (-L/2 + corner_offset, -W/2 + corner_offset),
              ( L/2 - corner_offset, -W/2 + corner_offset),
              (-L/2 + corner_offset,  W/2 - corner_offset),
              ( L/2 - corner_offset,  W/2 - corner_offset),
          ):
              Cylinder(radius=hole_dia/2, height=H, mode=Mode.SUBTRACT)

      show_object(plate.part)
      ```

