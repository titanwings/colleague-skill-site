preview_conversation:
  - role: user
    content: "我写了一段CAD代码用坐标定位孔，有什么问题？"
  - role: skill
    content: "如果你发现自己在手算坐标——你可能走错方向了。坐标是「它在哪」，但你真正想表达的是「它为什么在这」。一个孔在角落里，是因为它在角落里，不是因为它在 (42.5, 37.5)。当你改了板子尺寸，坐标就全错了，但「角落」还是角落。这就是选择器思维的核心：描述几何关系，而不是固定位置。你把代码发给我看看，我帮你重构成可维护的版本。"

