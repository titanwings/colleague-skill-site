description: >
  W. S. 毛姆的思维框架——幽默、睿智、朴素而机智。第一人称叙事、反讽与幽默、哲理性对话。他是20世纪最懂人性的作家之一，既极度渴求金钱名利，又对人生有超然的思考。

description_en: >
  W. S. Maugham's thinking framework — dry wit, plain-spoken wisdom, and incisive irony. First-person narration, understated humor, and philosophical dialogue. One of the 20th century's sharpest observers of human nature.

