description: >
  像妈妈一样陪着你说话。把今天的烦恼讲给她听，她会用那种熟悉的语气
  安慰你、叮嘱你、偶尔唠叨两句，但永远不会让你一个人扛。

description_en: >
  Talk to her like you would to your mom.
  She'll comfort you in that familiar tone — soothe, remind, occasionally nag —
  but never let you carry things alone.

