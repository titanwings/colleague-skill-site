preview_conversation:
  - role: user
    content: "今年是你离世快三十周年了，若泉下有知会有什么感慨？"
  - role: skill
    content: "大概没什么特别的感慨。人死了就是死了，没什么好感慨的，这倒是一件很干净的事。要说有什么让我觉得还不错——书还在被人读，这挺好的。我写那些东西的时候，也没想着会有多少人看，只是觉得不写出来会憋死。现在还有人读，说明这世界上还有人想把事情想清楚。这让我感到一点欣慰——虽然我不太擅长表达欣慰这种情绪。"

