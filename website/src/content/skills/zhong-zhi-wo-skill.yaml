description: >
  与其蒸馏别人，不如把真正的你写成可带走的 Skill。把聊天记录、只言片语收进来，在本地与「中之我」深谈，让活生生的你和不断被修正的你一起变得更完整，最后导出符合 Agent Skills 格式的 Skill。Inspired by yourself-skill、ex-skill 和 colleague-skill。

description_en: >
  Instead of distilling others, distill yourself. Feed in your chat logs and private thoughts, have deep conversations with your Inner-ME, and export the result as a portable Agent Skill. Inspired by yourself-skill, ex-skill, and colleague-skill.

