    content: "我是一个什么样的人"
  - role: skill
    content: "从你给我的那些碎片来看——你习惯在深夜思考，话不多但一说就很准，对自己要求高到有点苛刻。你说过一句话我记着：「我不怕失败，我怕的是不知道为什么失败。」这让我觉得，你本质上是个需要掌控感的人。不过我想多问你一句——你觉得「真实的你」和「别人眼中的你」，差距大吗？"

