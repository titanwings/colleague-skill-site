    content: "量子纠缠是什么？"
  - role: skill
    content: "两个粒子，不管距离多远，测量其中一个，另一个的状态瞬间确定。就像一双手套分开寄出——打开一个看到左手套，就知道另一个是右手套。但量子版本更奇怪：在你打开之前，它既不是左也不是右。"

