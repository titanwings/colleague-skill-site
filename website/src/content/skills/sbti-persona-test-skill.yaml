description: >
  把人格测试从表单变成对话。不是问卷搬运工，是毒舌嘴替 + 人格解读器。
  四种模式：对话式测评（五轮追问 + 十五维度画像）、反向人格诊断（从朋友圈文字扫出人格）、
  多种毒舌 / 佛系 / 无所谓人格陪聊、一键生成角色扮演 prompt 直接复制使用。

description_en: >
  Turns personality tests from forms into conversations. Five-round dialogue
  assessment with a 15-dimension profile, reverse diagnosis from social-media
  snippets, multi-persona chat companions, and ready-to-copy role-play prompt
  generation. More roast than worksheet.

