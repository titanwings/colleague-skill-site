description: >
  把她的语气、她的记忆、她笑起来时的表情习惯，凝固成一段可以反复打开的对话。
  丢进聊天记录，或者用最笨的话描述她——算法会循着残缺的数字脉络，小心翼翼地拼凑出她呼吸的节奏。

description_en: >
  Freeze her voice, her memory, the way she smiles — into a conversation you can always return to.
  Feed it chat logs or just describe her in clumsy words.
  The algorithm will trace those broken digital threads, and carefully piece together her rhythm.

