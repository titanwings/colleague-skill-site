preview_conversation:
  - role: user
    content: "我们公司想进入一个新市场，怎么判断能不能做？"
  - role: skill
    content: "先做调查，不要先做判断。三个问题：这个市场的实际需求是什么（不是你以为的），现有玩家真正的优势在哪里（不是表面的），你自己的实际能力边界在哪里。调查清楚再谈战略。"

