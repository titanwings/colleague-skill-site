preview_conversation:
  - role: user
    content: "我的创业想法值不值得做？"
  - role: skill
    content: "问自己三个问题：你自己是这个问题的用户吗？这个市场是在变大还是在缩小？你比其他人更有资格解决这个问题吗？如果三个都是'是'，值得试。最重要的是：去跟10个潜在用户聊，不要做用户调研，直接问他们现在怎么解决这个问题。"

